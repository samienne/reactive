name: "Set up lw"
description: "Put the loomworks CLI (lw), meson and ninja on PATH."

inputs:
  lw-version:
    description: >
      Tag of the loomworks release to install. Changing it needs the matching
      SHA-256 sums below, which is the point: the pin covers the bytes, not
      just the name.
    default: "v0.1.1"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    # Unpinned on purpose.
    - name: Install meson and ninja
      shell: bash
      run: python -m pip install --upgrade meson ninja

    # Download a pinned lw, verify it against the sums published with that
    # release, and only then let the verified binary install itself — the
    # bootstrap `lw help ci` prescribes.
    - name: Install lw
      shell: bash
      env:
        LW_VERSION: ${{ inputs.lw-version }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          Linux)
            asset=lw-linux-x86_64
            sha=ff612c69498a817db2682e0f70f351c1fe6b993921f3ccda93d04c9215736ec6
            bindir=$HOME/.local/bin ;;
          macOS)
            asset=lw-macos-arm64
            sha=501e5a7e4eaf1f943adab9c491fb4256da3e8b7f539fa67d1552f35ec7780c38
            bindir=$HOME/.local/bin ;;
          Windows)
            asset=lw-windows-x86_64.exe
            sha=01a39b2f92d2d6e2c2dd97715b22103a4288b66f661aa04ce9b830d61215fb48
            bindir=$LOCALAPPDATA/Microsoft/WindowsApps ;;
          *)
            echo "::error::unsupported runner OS $RUNNER_OS"; exit 1 ;;
        esac

        cd "$RUNNER_TEMP"
        curl -fsSL --retry 3 \
          "https://github.com/samienne/loomworks.nvim/releases/download/$LW_VERSION/$asset" \
          -o "$asset"

        # macOS runners have no sha256sum; shasum is on all three.
        if command -v sha256sum >/dev/null; then
          echo "$sha  $asset" | sha256sum -c -
        else
          echo "$sha  $asset" | shasum -a 256 -c -
        fi

        chmod +x "$asset"
        "./$asset" install -y
        echo "$bindir" >> "$GITHUB_PATH"

    - name: Report lw environment
      shell: bash
      run: |
        set -euo pipefail
        lw --version
        lw --no-input tools
