name: build-workflow
on: [push]
jobs:
    clang-format:
        name: "Clang-format"
        runs-on: "ubuntu-latest"
        if: false
        steps:
        - uses: actions/checkout@v5
          with:
              fetch-depth: 1
              ref: ${{ github.event.pull_request.head.sha }}
        - run: git fetch origin master --depth=1

        - name: Install clang-format-17 from llvm repositories
          run: |
            echo "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
            wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
            sudo apt update
            sudo apt install clang-format-17
            sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-17 20
            sudo update-alternatives --set clang-format /usr/bin/clang-format-17

        - name: Check with clang-format
          run: |
            git clang-format-17 origin/master --diffstat

    build-linux:
        name: "build-linux (${{ matrix.compiler.CC }} ${{ matrix.compiler.config }})"
        if: false # TEMP: reduced for ARM64 race debugging — restore before merge
        strategy:
            matrix:
                compiler: [
                  { "deps": "gcc-10 g++-10", "CC": "gcc-10", "CXX": "g++-10", "type": "release", config: ""},
                  { "deps": "gcc-11 g++-11", "CC": "gcc-11", "CXX": "g++-11", "type": "release", config: ""},
                  { "deps": "gcc-12 g++-12", "CC": "gcc-12", "CXX": "g++-12", "type": "release", config: ""},
                  { "deps": "clang-11", "CC": "clang-11", "CXX": "clang++-11", "type": "release", config: ""},
                  { "deps": "clang-11", "CC": "clang-11", "CXX": "clang++-11", "type": "release", config: "-Dtracy_enable=true"} ]
        runs-on: "ubuntu-22.04"
        steps:
        - uses: actions/checkout@v5
          with:
              submodules: recursive

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y ninja-build gcovr lcov libgl1-mesa-dev ${{ matrix.compiler.deps }}

        - name: Build
          run: |
            mkdir -p build/${{ matrix.compiler.CC }}-${{ matrix.compiler.type }}
            cd build/${{ matrix.compiler.CC }}-${{ matrix.compiler.type }}
            CC=${{ matrix.compiler.CC }} CXX=${{ matrix.compiler.CXX }} ../meson/meson.py setup --buildtype=${{ matrix.compiler.type }} --wrap-mode=forcefallback -Db_coverage=true ${{ matrix.compiler.config }} ../..
            ninja

        - name: Tests
          run: |
            ninja -C build/${{ matrix.compiler.CC }}-${{ matrix.compiler.type }} test

    build-macos:
        runs-on: "macos-15"
        steps:
        - uses: actions/checkout@v5
          with:
              submodules: recursive

        - name: Install dependencies
          run: |
            brew install python3 ninja

        # TEMP: reduced for ARM64 race debugging — restore before merge.
        # Builds and runs ONLY the small asyncstresstest target (btl is
        # header-only, so ninja compiles just that TU, not ase/avg/bqui) under
        # ThreadSanitizer, which flags the whenall.h store-buffering race
        # deterministically on the Apple-Silicon runner.
        - name: Build (TSan, async stress only)
          run: |
            sudo rm -Rf /Library/Developer/CommandLineTools
            sudo xcode-select -s /Applications/Xcode.app
            mkdir -p build/tsan
            cd build/tsan
            python3 ../meson/meson.py setup --buildtype=debug --wrap-mode=forcefallback -Db_sanitize=thread ../..
            ninja src/btl/asyncstresstest

        - name: Tests (TSan)
          run: |
            TSAN_OPTIONS="halt_on_error=1 exitcode=66" ./build/tsan/src/btl/asyncstresstest

    build-win:
        name: "build-win (${{ matrix.compiler.name }})"
        if: false # TEMP: reduced for ARM64 race debugging — restore before merge
        runs-on: "windows-2022"
        strategy:
            matrix:
                compiler: [
                  { "name": "msvc", "CC": "", "CXX": "" },
                  { "name": "clang-cl", "CC": "clang-cl", "CXX": "clang-cl" } ]
        steps:
        - uses: actions/checkout@v5
          name: checkout
          with:
              submodules: recursive

        - name: Build
          shell: pwsh
          run: |
            # download and install prerequisites
            function DownloadFile([String] $Source, [String] $Destination)
            {
                $retries = 2
                for ($i = 1; $i -le $retries; $i++)
                {
                    try
                    {
                        (New-Object net.webclient).DownloadFile($Source, $Destination)
                        break # succeeded
                    }
                    catch [net.WebException]
                    {
                        if ($i -eq $retries)
                        {
                        throw # fail on last retry
                        }

                        $backoff = (10 * $i) # backoff 10s, 20s, 30s...
                        echo ('{0}: {1}' -f $Source, $_.Exception.Message)
                        echo ('Retrying in {0}s...' -f $backoff)
                        Start-Sleep -m ($backoff * 1000)
                    }
                }
            }

            DownloadFile -Source 'https://github.com/mesonbuild/cidata/raw/master/ninja.exe' -Destination "ninja.exe"

            # add downloads to PATH
            $env:Path = "$env:SYSTEM_WORKFOLDER;$env:Path"

            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

            $vcvarspath = &$vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            Write-Output "vc tools located at: $vcvarspath"

            cmd.exe /c "call `"$vcvarspath\VC\Auxiliary\Build\vcvars64.bat`" && set > %temp%\vcvars.txt"

            Get-Content "$env:temp\vcvars.txt" | Foreach-Object {
                if ($_ -match "^(.*?)=(.*)$") {
                Set-Content "env:\$($matches[1])" $matches[2]
                }
            }

            $env:PKG_CONFIG_LIBDIR = "."

            # Select compiler for this matrix leg (empty CC => default MSVC).
            if ("${{ matrix.compiler.CC }}" -ne "") {
                $env:CC = "${{ matrix.compiler.CC }}"
                $env:CXX = "${{ matrix.compiler.CXX }}"
            }

            $builddir = "build/win-${{ matrix.compiler.name }}"
            md $builddir
            echo 'Configuring...'
            python build\meson\meson.py setup --buildtype=release --wrap-mode=forcefallback . $builddir
            echo 'Building...'
            ninja -C $builddir
            ninja -C $builddir test

    # Aggregating gate: this is the ONLY job to mark as a required status check.
    # It turns green only if every job it needs succeeded, so new matrix legs are
    # covered automatically; adding a brand-new top-level job just means adding it
    # to `needs` below (reviewed in-repo, not in branch-protection settings).
    ci-success:
        name: ci-success
        if: always()
        needs: [build-macos] # TEMP: reduced for ARM64 race debugging — restore [build-linux, build-macos, build-win] before merge
        runs-on: "ubuntu-22.04"
        steps:
        - name: Verify all required jobs succeeded
          run: |
            results="${{ join(needs.*.result, ' ') }}"
            echo "Required job results: $results"
            for r in $results; do
              if [ "$r" != "success" ]; then
                echo "::error::A required job did not succeed (got '$r'). Failing the gate."
                exit 1
              fi
            done
            echo "All required jobs succeeded."

