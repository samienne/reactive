name: build-workflow
on: [push]

env:
    # Belt and braces: lw also infers this from CI, but be explicit so a job
    # can never block on a prompt.
    LW_NO_INPUT: "1"

    # UBSan diagnoses and *continues* by default, which would let a sanitizer
    # leg print findings and still exit 0. Make both abort instead, so a finding
    # fails the job. Only the Sanitize leg has sanitizers linked in; these are
    # inert everywhere else.
    ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"
    UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"

jobs:
    clang-format:
        name: "Clang-format"
        runs-on: "ubuntu-latest"
        if: false
        steps:
        - uses: actions/checkout@v5
          with:
              fetch-depth: 1
              ref: ${{ github.event.pull_request.head.sha }}
        - run: git fetch origin master --depth=1

        - name: Install clang-format-17 from llvm repositories
          run: |
            echo "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
            wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
            sudo apt update
            sudo apt install clang-format-17
            sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-17 20
            sudo update-alternatives --set clang-format /usr/bin/clang-format-17

        - name: Check with clang-format
          run: |
            git clang-format-17 origin/master --diffstat

    build-linux:
        name: "build-linux (${{ matrix.leg.tool }} ${{ matrix.leg.set }})"
        strategy:
            fail-fast: false
            matrix:
                leg: [
                  { "deps": "gcc-10 g++-10", "tool": "gcc-10",   "set": "Release" },
                  { "deps": "gcc-11 g++-11", "tool": "gcc-11",   "set": "Release" },
                  { "deps": "gcc-12 g++-12", "tool": "gcc-12",   "set": "Release" },
                  { "deps": "clang-11",      "tool": "clang-11", "set": "Release" },
                  { "deps": "clang-11",      "tool": "clang-11", "set": "Tracy"   },
                  { "deps": "",              "tool": "clang-15", "set": "Sanitize" } ]
        runs-on: "ubuntu-22.04"
        steps:
        - uses: actions/checkout@v5

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y libgl1-mesa-dev ${{ matrix.leg.deps }}

        - uses: ./.github/actions/setup-lw

        - uses: ./.github/actions/lw-build-test
          with:
            set: ${{ matrix.leg.set }}
            tool: ${{ matrix.leg.tool }}

    build-macos:
        name: "build-macos (${{ matrix.set }})"
        strategy:
            fail-fast: false
            matrix:
                set: [Release, Debug]
        runs-on: "macos-15"
        steps:
        - uses: actions/checkout@v5

        - name: Select the full Xcode toolchain
          run: sudo xcode-select -s /Applications/Xcode.app

        - uses: ./.github/actions/setup-lw

        # `clang-17` is Apple clang from the selected Xcode; note that lw also
        # reports it as `gcc-17` via the /usr/bin/gcc shim.
        - uses: ./.github/actions/lw-build-test
          with:
            set: ${{ matrix.set }}
            tool: clang-17

    build-win:
        name: "build-win (${{ matrix.tool }})"
        runs-on: "windows-2022"
        strategy:
            fail-fast: false
            matrix:
                tool: [msvc-17, clang-cl]
        steps:
        - uses: actions/checkout@v5
          name: checkout

        - uses: ./.github/actions/setup-lw

        # lw establishes the MSVC environment itself; ninja comes from pip.
        - uses: ./.github/actions/lw-build-test
          with:
            set: Release
            tool: ${{ matrix.tool }}

    # Aggregating gate: this is the ONLY job to mark as a required status check.
    # It turns green only if every job it needs succeeded, so new matrix legs are
    # covered automatically; adding a brand-new top-level job just means adding it
    # to `needs` below (reviewed in-repo, not in branch-protection settings).
    ci-success:
        name: ci-success
        if: always()
        needs: [build-linux, build-macos, build-win]
        runs-on: "ubuntu-22.04"
        steps:
        - name: Verify all required jobs succeeded
          run: |
            results="${{ join(needs.*.result, ' ') }}"
            echo "Required job results: $results"
            for r in $results; do
              if [ "$r" != "success" ]; then
                echo "::error::A required job did not succeed (got '$r'). Failing the gate."
                exit 1
              fi
            done
            echo "All required jobs succeeded."

